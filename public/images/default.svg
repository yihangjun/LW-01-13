<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- 背景 -->
  <rect width="400" height="400" fill="#f0f0f0"/>
  
  <!-- 图标 - 包裹盒子 -->
  <g transform="translate(100, 120)">
    <!-- 盒子主体 -->
    <rect x="40" y="60" width="120" height="100" rx="8" fill="#d9d9d9" stroke="#999" stroke-width="2"/>
    
    <!-- 盒子盖子 -->
    <path d="M 35 60 L 165 60 L 155 40 L 45 40 Z" fill="#bfbfbf" stroke="#999" stroke-width="2"/>
    
    <!-- 胶带 -->
    <rect x="95" y="40" width="10" height="120" fill="#ffd780" opacity="0.8"/>
  </g>
  
  <!-- 文字 -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" fill="#999" text-anchor="middle">暂无图片</text>
  
  <!-- 问号图标 -->
  <circle cx="200" cy="320" r="15" fill="#d9d9d9"/>
  <text x="200" y="326" font-family="Arial, sans-serif" font-size="20" fill="#666" text-anchor="middle" font-weight="bold">?</text>
</svg>
